<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BodaSacco - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2ecc71">
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo">🏍️ BodaSacco</div>
            <p class="tagline">Manage your SACCO on the go</p>
        </div>

        <div class="auth-tabs">
            <button class="tab-btn active" onclick="showLogin()">Login</button>
            <button class="tab-btn" onclick="showSignup()">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active">
            <div class="form-group">
                <label>Phone Number (Safaricom)</label>
                <input type="tel" id="loginPhone" placeholder="07XX XXX XXX" pattern="[0-9]{10}" required>
            </div>
            <div class="form-group">
                <label>PIN</label>
                <input type="password" id="loginPin" placeholder="Enter 4-digit PIN" maxlength="4" pattern="[0-9]{4}" required>
            </div>
            <button type="submit" class="btn-primary">🔓 Login</button>
            <p class="mpesa-note">⚡ Use M-Pesa PIN format for easy recall</p>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="auth-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signupName" placeholder="e.g., John Kamau" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="signupPhone" placeholder="07XX XXX XXX" pattern="[0-9]{10}" required>
            </div>
            <div class="form-group">
                <label>SACCO Name</label>
                <input type="text" id="saccoName" placeholder="e.g., Kawangware Boda" required>
            </div>
            <div class="form-group">
                <label>Create 4-digit PIN</label>
                <input type="password" id="signupPin" placeholder="****" maxlength="4" pattern="[0-9]{4}" required>
            </div>
            <div class="form-group">
                <label>Confirm PIN</label>
                <input type="password" id="confirmPin" placeholder="****" maxlength="4" pattern="[0-9]{4}" required>
            </div>
            <button type="submit" class="btn-primary">📝 Register</button>
        </form>

        <div class="offline-badge" id="offlineBadge" style="display: none;">
            📴 You're offline - changes will sync when connected
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
