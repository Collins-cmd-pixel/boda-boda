<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loans - BodaSacco</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <span class="nav-icon">📊</span>
            <span class="nav-label">Home</span>
        </a>
        <a href="earnings.html" class="nav-item">
            <span class="nav-icon">💰</span>
            <span class="nav-label">Earnings</span>
        </a>
        <a href="loans.html" class="nav-item active">
            <span class="nav-icon">💳</span>
            <span class="nav-label">Loans</span>
        </a>
        <a href="members.html" class="nav-item">
            <span class="nav-icon">👥</span>
            <span class="nav-label">Members</span>
        </a>
    </div>

    <div class="main-content">
        <!-- Loan Summary -->
        <div class="loan-summary">
            <div class="loan-card outstanding">
                <span>Outstanding Loan</span>
                <strong>KES 8,200</strong>
                <small>Due: 15/05/2026</small>
            </div>
            <div class="loan-card limit">
                <span>Loan Limit</span>
                <strong>KES 50,000</strong>
                <small>Available: KES 41,800</small>
            </div>
        </div>

        <!-- Loan Calculator -->
        <div class="card">
            <h3>Loan Calculator</h3>
            <div class="form-group">
                <label>Loan Amount (KES)</label>
                <input type="number" id="loanAmount" placeholder="e.g., 10000" min="1000" step="1000">
            </div>
            <div class="form-group">
                <label>Repayment Period</label>
                <select id="repaymentPeriod">
                    <option value="30">30 days</option>
                    <option value="60">60 days</option>
                    <option value="90">90 days</option>
                </select>
            </div>
            <div class="calculation-result" id="loanCalculation">
                <p>Interest (5%): <span>KES 500</span></p>
                <p>Total to repay: <span>KES 10,500</span></p>
                <p>Daily payment: <span>KES 350</span></p>
            </div>
            <button class="btn-primary" onclick="applyForLoan()">Apply for Loan</button>
        </div>

        <!-- Loan History -->
        <div class="card">
            <h3>Loan History</h3>
            <div class="loan-history-item">
                <div>
                    <strong>KES 5,000</strong>
                    <small>Paid on 01/04/2026</small>
                </div>
                <span class="badge success">Paid</span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
