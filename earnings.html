<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnings - BodaSacco</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <span class="nav-icon">📊</span>
            <span class="nav-label">Home</span>
        </a>
        <a href="earnings.html" class="nav-item active">
            <span class="nav-icon">💰</span>
            <span class="nav-label">Earnings</span>
        </a>
        <a href="loans.html" class="nav-item">
            <span class="nav-icon">💳</span>
            <span class="nav-label">Loans</span>
        </a>
        <a href="members.html" class="nav-item">
            <span class="nav-icon">👥</span>
            <span class="nav-label">Members</span>
        </a>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h2>💰 Earnings Tracker</h2>
            <button class="btn-primary btn-small" onclick="location.href='add-earning.html'">+ Add</button>
        </div>

        <!-- Summary Cards -->
        <div class="summary-cards">
            <div class="summary-card">
                <span>Today</span>
                <strong id="todayTotal">KES 1,450</strong>
            </div>
            <div class="summary-card">
                <span>This Week</span>
                <strong id="weekTotal">KES 8,450</strong>
            </div>
            <div class="summary-card">
                <span>This Month</span>
                <strong id="monthTotal">KES 32,200</strong>
            </div>
        </div>

        <!-- Earnings List -->
        <div class="list-section">
            <div class="list-header">
                <h3>Recent Earnings</h3>
                <select id="filterPeriod" onchange="filterEarnings()">
                    <option value="today">Today</option>
                    <option value="week">This Week</option>
                    <option value="month">This Month</option>
                </select>
            </div>

            <div class="earnings-list" id="earningsList">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
